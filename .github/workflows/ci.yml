name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Test with coverage
        run: pnpm --filter @sentinel/web test -- --coverage --coverage.provider=v8 --coverage.reporter=text --coverage.reporter=lcov
      - name: Build
        run: pnpm turbo build --filter=@sentinel/web

  engine:
    name: Engine (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/engine
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src/
      - name: Type check
        run: uv run python -m mypy src/ --ignore-missing-imports || true
      - name: Test with coverage
        run: uv run python -m pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-fail-under=70

  agents:
    name: Agents (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint & Type Check
        run: pnpm turbo lint --filter=@sentinel/agents
      - name: Test
        run: pnpm --filter @sentinel/agents test
      - name: Test with coverage
        run: pnpm --filter @sentinel/agents test -- --coverage --coverage.provider=v8 --coverage.reporter=text --coverage.reporter=lcov
      - name: Build
        run: pnpm turbo build --filter=@sentinel/agents

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [engine, agents]
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.app }}
        run: docker build -f apps/${{ matrix.app }}/Dockerfile -t sentinel-${{ matrix.app }}:ci .
