name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Detect which apps changed so we can skip unrelated jobs on PRs.
# On pushes to main every job still runs (paths-filter defaults to true).
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      engine: ${{ steps.filter.outputs.engine }}
      agents: ${{ steps.filter.outputs.agents }}
      shared: ${{ steps.filter.outputs.shared }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
            engine:
              - 'apps/engine/**'
            agents:
              - 'apps/agents/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
            shared:
              - 'packages/shared/**'
            docker:
              - 'apps/engine/Dockerfile'
              - 'apps/agents/Dockerfile'
              - 'docker-compose.yml'

  web:
    name: Web (Next.js)
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.12.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Test with coverage
        run: pnpm --filter @sentinel/web test -- --coverage --coverage.provider=v8 --coverage.reporter=text --coverage.reporter=lcov
      - name: Build
        run: pnpm turbo build --filter=@sentinel/web

  engine:
    name: Engine (Python)
    needs: changes
    if: ${{ needs.changes.outputs.engine == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/engine
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src/ tests/
      - name: Type check
        run: uv run python -m mypy src/ --ignore-missing-imports || true
      - name: Test with coverage
        run: uv run python -m pytest tests/ -v --tb=short --cov=src --cov-report=xml --cov-fail-under=70

  agents:
    name: Agents (TypeScript)
    needs: changes
    if: ${{ needs.changes.outputs.agents == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.12.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint & Type Check
        run: pnpm turbo lint --filter=@sentinel/agents
      - name: Test with coverage
        run: pnpm --filter @sentinel/agents test -- --coverage --coverage.provider=v8 --coverage.reporter=text --coverage.reporter=lcov
      - name: Build
        run: pnpm turbo build --filter=@sentinel/agents

  docker:
    name: Docker Build
    needs: changes
    if: ${{ needs.changes.outputs.docker == 'true' || needs.changes.outputs.engine == 'true' || needs.changes.outputs.agents == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [engine, agents]
    steps:
      - uses: actions/checkout@v6
      - name: Build ${{ matrix.app }}
        run: docker build -f apps/${{ matrix.app }}/Dockerfile -t sentinel-${{ matrix.app }}:ci .
