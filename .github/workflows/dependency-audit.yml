name: Dependency Audit

on:
  # Run weekly on Monday mornings instead of on every push/PR.
  # This avoids redundant audit runs — vulnerabilities rarely change between commits.
  schedule:
    - cron: '0 8 * * 1'
  # Still run on pushes to main so new deps are checked after merge.
  push:
    branches: [main]
    paths:
      - 'pnpm-lock.yaml'
      - 'apps/engine/pyproject.toml'
      - 'apps/engine/uv.lock'
  # Allow manual trigger for ad-hoc audits.
  workflow_dispatch:

jobs:
  audit-npm:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit dependencies
        run: pnpm audit --audit-level=high || true

  audit-python:
    name: pip audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/engine
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --extra dev
      - name: Install pip-audit
        run: uv pip install pip-audit
      - name: Audit Python dependencies
        run: uv run pip-audit || true
