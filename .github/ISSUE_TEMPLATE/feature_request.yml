name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: If you have ideas on implementation, describe them here.
    validations:
      required: false