version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    assignees:
      - stevenschling13
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: "/apps/engine"
    schedule:
      interval: weekly
    assignees:
      - stevenschling13
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep GitHub Actions up to date (checkout, setup-node, setup-python, etc.)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    assignees:
      - stevenschling13
    groups:
      actions:
        patterns:
          - "*"