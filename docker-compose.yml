services:
  engine:
    build:
      context: .
      dockerfile: apps/engine/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  agents:
    build:
      context: .
      dockerfile: apps/agents/Dockerfile
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - ENGINE_URL=http://engine:8000
      - WEB_URL=http://localhost:3000
    depends_on:
      engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>{if(!r.ok)throw r.status})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
